name: CI/CD Pipeline - Quarkus App

on:
  push:
    branches: [ "main", "master" ]

env:
  DOCKER_HUB_USER: 'ryanocastro'
  APP_NAME: 'quarkus-app'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  mvn-compile:
    name: Compilar o projeto
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Rodar Testes
        run: ./mvnw clean compile

  mvn-test:
    name: Testes Unitários
    needs: mvn-compile
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Rodar Testes
        run: ./mvnw test

  mvn-package:
    name: Empacotar a aplicação
    needs: mvn-test
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Empacotar
        run: ./mvnw package -DskipTests

      - name: Salvar Artefato (target)
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-build-artifact
          path: target/

  docker-push:
    name: Docker Hub
    needs:  mvn-package
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Baixar Artefato (target)
        uses: actions/download-artifact@v4
        with:
          name: quarkus-build-artifact
          path: target/

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USER }}/${{ env.APP_NAME }}:v${{ github.run_number }}
            ${{ env.DOCKER_HUB_USER }}/${{ env.APP_NAME }}:latest