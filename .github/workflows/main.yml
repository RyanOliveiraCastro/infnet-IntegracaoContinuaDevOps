name: CI/CD Pipeline - Quarkus App

on:
  push:
    branches: [ "main", "master" ]

env:
  DOCKER_HUB_USER: 'ryanocastro'
  APP_NAME: 'quarkus-app'

jobs:

  init:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

  mvn-compile:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Compilar o projeto
        run: ./mvnw clean compile
  mvn-test:
    runs-on: ubuntu-latest
    steps:
      - name: 2. Rodar testes
        run: ./mvnw test
  mvn-package:
    runs-on: ubuntu-latest
    steps:
      - name: 3. Empacotar a aplicação
        run: ./mvnw package -DskipTests
  push-docker:
    runs-on: ubuntu-latest
    steps:
      - name: 4 Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 4.1 Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USER }}/${{ env.APP_NAME }}:v${{ github.run_number }}
            ${{ env.DOCKER_HUB_USER }}/${{ env.APP_NAME }}:latest