# app-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quarkus-app-deploy
spec:
  replicas: 4
  selector:
    matchLabels:
      app: quarkus-app
  template:
    metadata:
      labels:
        app: quarkus-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/q/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: quarkus-app
          image: ryanocastro/quarkus-app:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: "postgresql"
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://postgres-service:5432/db"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: "user"
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: "pass"
            - name: QUARKUS_OTEL_SDK_DISABLED
              value: "true"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: quarkus-app-service
spec:
  type: NodePort
  selector:
    app: quarkus-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080